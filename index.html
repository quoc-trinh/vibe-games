<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #70c5ce;
        font-family: Arial, sans-serif;
    }

    canvas {
        border: 2px solid #000;
        background: skyblue;
    }
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const bird = {
    x: 80,
    y: 300,
    radius: 15,
    velocity: 0,
    gravity: 0.5,
    jump: -8
};

let pipes = [];
let score = 0;
let gameOver = false;
let frame = 0;

function resetGame() {
    bird.y = 300;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    frame = 0;
    gameOver = false;
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") {
        if (gameOver) {
            resetGame();
        } else {
            bird.velocity = bird.jump;
        }
    }
});

document.addEventListener("click", () => {
    if (gameOver) {
        resetGame();
    } else {
        bird.velocity = bird.jump;
    }
});

function drawBird() {
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
    ctx.fillStyle = "yellow";
    ctx.fill();
    ctx.stroke();
}

function drawPipes() {
    ctx.fillStyle = "green";

    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(
            pipe.x,
            pipe.top + pipe.gap,
            pipe.width,
            canvas.height
        );
    });
}

function update() {
    if (gameOver) return;

    frame++;

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    if (frame % 90 === 0) {
        const topHeight = Math.random() * 250 + 50;

        pipes.push({
            x: canvas.width,
            width: 60,
            top: topHeight,
            gap: 150,
            counted: false
        });
    }

    pipes.forEach(pipe => {
        pipe.x -= 3;

        if (!pipe.counted && pipe.x + pipe.width < bird.x) {
            score++;
            pipe.counted = true;
        }

        const hitPipe =
            bird.x + bird.radius > pipe.x &&
            bird.x - bird.radius < pipe.x + pipe.width &&
            (
                bird.y - bird.radius < pipe.top ||
                bird.y + bird.radius > pipe.top + pipe.gap
            );

        if (hitPipe) {
            gameOver = true;
        }
    });

    pipes = pipes.filter(pipe => pipe.x + pipe.width > 0);

    if (
        bird.y + bird.radius > canvas.height ||
        bird.y - bird.radius < 0
    ) {
        gameOver = true;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPipes();
    drawBird();

    ctx.fillStyle = "black";
    ctx.font = "30px Arial";
    ctx.fillText("Score: " + score, 20, 40);

    if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "40px Arial";
        ctx.fillText("Game Over", 85, 250);

        ctx.font = "24px Arial";
        ctx.fillText("Click or Space to Restart", 50, 300);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
